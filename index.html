<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Finance App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
}

/* Mobile Frame */
.app{
width:100%;
max-width:420px;
height:95vh;
background:linear-gradient(135deg,#141e30,#243b55);
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
color:white;
position:relative;
}

/* Screens */
.screen{
position:absolute;
width:100%;
height:100%;
overflow-y:auto;
padding-bottom:80px;
transition:transform 0.4s ease;
}

.hidden{
transform:translateX(100%);
}

.card{
margin:15px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

.progress{
height:12px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:lime;
transition:width 0.6s ease;
}

.warning{
background:red !important;
}

.fab{
position:absolute;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#00c6ff;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
font-size:14px;
}

button{
background:#00c6ff;
color:white;
cursor:pointer;
}

h3{margin-top:0;}
</style>
</head>
<body>

<div class="app">

<!-- Lock Screen -->
<div id="lockScreen" class="screen">
<div class="card">
<h2>🔒 Fingerprint Unlock</h2>
<button onclick="unlock()">Scan Fingerprint</button>
</div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="screen hidden">
<div class="card">
<h3>Summary</h3>

<select id="monthFilter">
<option value="all">All Months</option>
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">May</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Aug</option>
<option value="8">Sep</option>
<option value="9">Oct</option>
<option value="10">Nov</option>
<option value="11">Dec</option>
</select>

<br><br>
Income ₹<span id="income">0</span><br>
Expense ₹<span id="expense">0</span><br>
Savings ₹<span id="savings">0</span>

<h4>Budget Progress (₹20000)</h4>
<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<div class="card" style="height:220px;">
<canvas id="chart"></canvas>
</div>

<div class="fab" onclick="showAdd()">+</div>
</div>

<!-- Add Screen -->
<div id="addScreen" class="screen hidden">
<div class="card">
<h3>Add Transaction</h3>

<input type="date" id="date">
<input id="desc" placeholder="Description">

<select id="category">
<option>Katta Expenses</option>
<option>Mopa Expenses</option>
<option>Banda Expenses</option>
</select>

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<button onclick="addTransaction()">Save</button>
<button onclick="back()">Back</button>
</div>
</div>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem("data")) || [];
let budget = 20000;
let chart;

document.getElementById("date").valueAsDate = new Date();

function unlock(){
document.getElementById("lockScreen").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
render();
}

function showAdd(){
document.getElementById("addScreen").classList.remove("hidden");
}

function back(){
document.getElementById("addScreen").classList.add("hidden");
}

function addTransaction(){
let date = document.getElementById("date").value;
let desc = document.getElementById("desc").value.trim();
let category = document.getElementById("category").value;
let amount = parseFloat(document.getElementById("amount").value);
let type = document.getElementById("type").value;

if(!date || !desc || isNaN(amount) || amount<=0){
alert("Fill valid data");
return;
}

transactions.push({date, desc, category, amount, type});
localStorage.setItem("data", JSON.stringify(transactions));

document.getElementById("desc").value="";
document.getElementById("amount").value="";
document.getElementById("date").valueAsDate = new Date();

back();
render();
}

function render(){
let month = document.getElementById("monthFilter").value;
let income=0, expense=0;
let categories={};

transactions.forEach(t=>{
let tMonth = new Date(t.date).getMonth();
if(month!="all" && tMonth!=month) return;

if(t.type==="income") income+=t.amount;
else{
expense+=t.amount;
categories[t.category]=(categories[t.category]||0)+t.amount;
}
});

let savings = income-expense;

document.getElementById("income").innerText=income.toFixed(2);
document.getElementById("expense").innerText=expense.toFixed(2);
document.getElementById("savings").innerText=savings.toFixed(2);

let percent = expense>0 ? (expense/budget)*100 : 0;
percent=Math.min(percent,150);

let bar=document.getElementById("progressBar");
bar.style.width=percent+"%";

if(percent>100) bar.classList.add("warning");
else bar.classList.remove("warning");

if(chart) chart.destroy();

if(Object.keys(categories).length===0){
categories={"No Data":1};
}

chart=new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:Object.keys(categories),
datasets:[{data:Object.values(categories)}]
},
options:{responsive:true,maintainAspectRatio:false}
});
}

document.getElementById("monthFilter").addEventListener("change",render);
</script>

</body>
</html>
