<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Finance App</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
overflow:hidden;
}
.screen{position:absolute;width:100%;height:100%;transition:0.4s;}
.hidden{transform:translateX(100%);}
.card{margin:20px;padding:20px;border-radius:20px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);}
.progress{height:15px;background:#333;border-radius:20px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:lime;transition:1s;}
.warning{background:red !important;}
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#00c6ff;display:flex;justify-content:center;align-items:center;font-size:30px;cursor:pointer;}
input,select,button{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:none;}
</style>
</head>
<body>

<div id="lockScreen" class="screen">
<div class="card">
<h2>🔒 Fingerprint Unlock</h2>
<button onclick="unlock()">Scan Fingerprint</button>
</div>
</div>

<div id="dashboard" class="screen hidden">
<div class="card">
<h3>Summary</h3>
Income ₹<span id="income">0</span><br>
Expense ₹<span id="expense">0</span><br>
Savings ₹<span id="savings">0</span>

<h4>Budget Progress (Limit 20000)</h4>
<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="fab" onclick="showAdd()">+</div>
</div>

<div id="addScreen" class="screen hidden">
<div class="card">
<h3>Add Transaction</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button onclick="addTransaction()">Save</button>
<button onclick="back()">Back</button>
</div>
</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

let transactions=JSON.parse(localStorage.getItem("data"))||[];
let budget=20000;
let chart;

function unlock(){
document.getElementById("lockScreen").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
render();
}

function showAdd(){
document.getElementById("addScreen").classList.remove("hidden");
}

function back(){
document.getElementById("addScreen").classList.add("hidden");
}

function addTransaction(){
let desc=document.getElementById("desc").value;
let amount=parseFloat(document.getElementById("amount").value);
let type=document.getElementById("type").value;

if(!desc||!amount) return alert("Fill all fields");

transactions.push({desc,amount,type});
localStorage.setItem("data",JSON.stringify(transactions));
back();
render();
}

function render(){
let income=0,expense=0;
let categories={};

transactions.forEach(t=>{
if(t.type=="income") income+=t.amount;
else{
expense+=t.amount;
categories[t.desc]=(categories[t.desc]||0)+t.amount;
}
});

let savings=income-expense;
document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("savings").innerText=savings;

let percent=(expense/budget)*100;
let bar=document.getElementById("progressBar");
bar.style.width=percent+"%";

if(percent>100){ bar.classList.add("warning"); }
else{ bar.classList.remove("warning"); }

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:Object.keys(categories),
datasets:[{data:Object.values(categories)}]
}
});
}
</script>
</body>
</html>
